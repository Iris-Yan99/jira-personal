<svg width="92" height="32" viewBox="0 0 92 32" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Outer square frame -->
  <rect x="2" y="6" width="20" height="20" stroke="#2d4fa0" stroke-width="1.5" fill="none"/>
  <!-- Corner dot - top left (overlaps corner of frame) -->
  <rect x="0" y="4" width="5" height="5" fill="#2d4fa0"/>
  <!-- Corner dot - bottom right (overlaps corner of frame) -->
  <rect x="17" y="23" width="5" height="5" fill="#2d4fa0"/>
  <!-- Inner solid square (centered) -->
  <rect x="8" y="12" width="8" height="8" fill="#2d4fa0"/>
  <!-- Plano text -->
  <text x="30" y="22" fill="#2d4fa0" font-size="17" font-weight="700" font-family="system-ui, -apple-system, BlinkMacSystemFont, sans-serif" letter-spacing="-0.3">Plano</text>
</svg>
